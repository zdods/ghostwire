services:
  ghostwire:
    build: .
    container_name: ghostwire
    restart: unless-stopped
    privileged: true
    environment:
      - PUID=1000
      - PGID=1000
      - PEER_PORT=51413
      # Optional: restrict web UI to a specific subnet, e.g. 192.168.1.0/24
      # - WEBUI_ALLOW=192.168.1.0/24
    volumes:
      - /path/to/your/nas/volume:/data
    ports:
      - "9091:9091"
      - "51413:51413/tcp"
      - "51413:51413/udp"
